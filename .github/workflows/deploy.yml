name: 自动部署 # 步骤名称

on:
  push:
    branches:
      - master
    # paths-ignore:
    #   - README.md
    #   - LICENSE
    paths:
      - src/**
      - package.json

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: npm i

      - name: 编译构建
        run: npm run build

      - name: 部署到测试服务器
        uses: burnett01/rsync-deployments@7.1.0
        with:
          switches: -avzr --delete
          path: 'dist/' # 注意：通常不需要 /*，rsync 会处理好目录同步
          remote_path: '/home/suask/test-frontend/' # 修改为测试环境目录
          remote_host: ${{ secrets.SERVER_IP }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
